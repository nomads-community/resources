# YAML file containing amplicon drug resistance markers in the format:
#
# gene:
  # validated: []
  # candidate: []
  # potential: []
  # combinations:
    # colour: []
# List originally taken from https://www.who.int/news-room/questions-and-answers/item/artemisinin-resistance
# Updated with WHO compendium, released Dec 2025

# Gene names
#  crt:   Chloroquine resistance transporter
#  cytb:  Cytochrome b (mitochondrial)
#  chfr:  Dihydrofolate reductase
#  dhps:  Dihydropteroate synthase
#  gch1:  GTP-cyclohydrolase I
#  k13:   Kelch 13 (kelch-propeller domain protein)
#  mdr1:  Multidrug resistance gene 1
#  pm2/3: Plasmepsin 2 and 3

